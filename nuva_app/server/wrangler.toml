name                = "nuva-claude"
main                = "cloudflare-worker.js"
compatibility_date  = "2024-01-01"
workers_dev         = true
preview_urls        = false

# Secrets (set separately, never committed):
#   npx wrangler secret put ANTHROPIC_API_KEY
#   npx wrangler secret put NUVA_CLIENT_KEY
#
# After deploy, copy the *.workers.dev URL into:
#   nuva_app/.env  →  CLAUDE_PROXY_URL=https://nuva-claude.<sub>.workers.dev
