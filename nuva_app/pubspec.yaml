name: nuva
description: Nuva — психологическая поддержка. AI-подбор специалиста, маркетплейс психологов.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  google_fonts: ^6.2.1
  http: ^1.2.2
  url_launcher: ^6.3.0
  intl: any
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.3.2
  # Secure, OS-backed store (Keychain / Keystore; WebCrypto-wrapped on web) for
  # the JWT session tokens — special-category data must not sit in plaintext
  # shared_preferences. See lib/services/backend_auth.dart.
  flutter_secure_storage: ^9.2.2
  image_picker: ^1.1.2
  image: ^4.2.0
  # sentry_flutter: re-enable when Kotlin compat is resolved. For now we
  # use the observability stub which prints to console.

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#5EA0F0"
  adaptive_icon_foreground: "assets/images/icon_foreground.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/icon.png"
    background_color: "#5EA0F0"
    theme_color: "#5EA0F0"

flutter_native_splash:
  color: "#5EA0F0"
  image: "assets/images/splash_logo.png"
  android: true
  ios: false
  web: false
  android_12:
    color: "#5EA0F0"
    image: "assets/images/splash_logo.png"

flutter:
  uses-material-design: true

  assets:
    - .env
